<script>
    // 全局数据存储

    function showPage(pageNum) {
        if (pageNum < 1 || pageNum > 8) return;
        for (let i = 1; i <= 8; i++) {
            const p = document.getElementById(`page${i}`);
            if (p) p.classList.remove('active');
        }
        const target = document.getElementById(`page${pageNum}`);
        if (target) target.classList.add('active');
        currentPage = pageNum;
        window.scrollTo(0, 0);
    }

    function collectBase() {
        studentData.base.subject = document.getElementById('subjectCombo')?.value || '';
        studentData.base.grade = document.getElementById('grade')?.value || '';
    }

    // 构造整洁的邮件内容（纯文本但结构化，表格风格）
    function buildReportText() {
        return `

═══════════════════════════════════════════════════════════════════
`;

        collectTask5Final();

        const reportText = buildReportText();
        const formData = new FormData();
        formData.append('email', '2399538637@qq.com');
        formData.append('subject', '高中地理数字素养测评结果');
        formData.append('message', reportText);
        formData.append('_replyto', '2399538637@qq.com');
        formData.append('_captcha', 'false');

        fetch('https://formsubmit.co/ajax/2399538637@qq.com', {
            method: 'POST',
            body: formData
        })
        .then(response => {
            if (response.ok) {
                alert('✅ 提交成功！结果已发送至老师邮箱。');
                showPage(8);
            } else {
                alert('❌ 提交失败，请稍后重试。');
            }
        })
        .catch(err => {
            alert('❌ 网络错误，请检查连接。错误：' + err.message);
        });
    }
